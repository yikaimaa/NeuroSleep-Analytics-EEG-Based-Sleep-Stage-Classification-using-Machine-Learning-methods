name: Sleep Stage Classification CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  train-and-evaluate:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install "numpy<2" torch mne xgboost pandas scikit-learn matplotlib seaborn scipy

    - name: Cache Sleep-EDF data
      uses: actions/cache@v4
      with:
        path: data/sleep-edf
        key: sleep-edf-${{ runner.os }}-7subjects-v1

    - name: Fetch Sleep-EDF subset
      env:
        N_SUBJECTS_FETCH: 6
      run: |
        python fetch_all_data.py

    - name: Run XGBoost Training
      run: |
        python src/train_xgboost.py \
          --max-subjects 6 \
          --output-dir results/xgboost

    - name: Run Attention Training
      run: |
        python src/train_attention.py \
          --max-subjects 6 \
          --val-subjects 1 \
          --epochs 15 \
          --batch-size 64 \
          --num-workers 2 \
          --learning-rate 5e-4 \
          --patience 2 \
          --label-smoothing 0.0 \
          --output-dir results/attention

    - name: Run U-Sleep Training
      run: |
        python src/train_usleep.py \
          --max-subjects 6 \
          --val-subjects 1 \
          --epochs 15 \
          --batch-size 64 \
          --num-workers 2 \
          --learning-rate 5e-4 \
          --patience 2 \
          --label-smoothing 0.0 \
          --output-dir results/usleep

    - name: Set up Quarto
      uses: quarto-dev/quarto-actions/setup@v2

    - name: Install TinyTeX
      run: quarto install tinytex

    - name: Align results for report
      run: |
        mkdir -p results
        cp results/xgboost/confusion_matrix.png results/confusion_matrix.png

    - name: Render Executive Report
      run: quarto render "executive report/ex report.qmd" --to pdf

    - name: Upload Results Snapshot
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: sleep-staging-results
        path: |
          results/
          executive report/*.pdf
