name: Sleep Stage Classification CI

on:
  workflow_dispatch:

jobs:
  attention-hmm-sweep:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        transition_weight: [0.0, 0.5, 1.0, 2.0]

    env:
      PYTHONUNBUFFERED: "1"
      TRANSITION_SMOOTHING: "1.0"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install "numpy<2" torch mne xgboost pandas scikit-learn matplotlib seaborn scipy

    - name: Cache Sleep-EDF data
      uses: actions/cache@v4
      with:
        path: data/sleep-edf
        key: sleep-edf-${{ runner.os }}-7subjects-v1

    - name: Fetch Sleep-EDF subset
      env:
        N_SUBJECTS_FETCH: 6
      run: |
        python fetch_all_data.py

    - name: Run Attention Training
      run: |
        python src/train_attention.py \
          --max-subjects 6 \
          --epochs 8 \
          --batch-size 64 \
          --num-workers 0 \
          --learning-rate 5e-4 \
          --patience 2 \
          --label-smoothing 0.0 \
          --transition-smoothing ${TRANSITION_SMOOTHING} \
          --transition-weight ${{ matrix.transition_weight }} \
          --max-train-batches 10 \
          --max-eval-batches 10 \
          --output-dir results/attention_w${{ matrix.transition_weight }}

    - name: Upload Results Snapshot
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: attention-results-w${{ matrix.transition_weight }}
        path: results/attention_w${{ matrix.transition_weight }}/