name: Sleep Stage Classification CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  train-and-evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      PYTHONUNBUFFERED: "1"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install "numpy<2" torch mne xgboost pandas scikit-learn matplotlib seaborn scipy

    - name: Cache Sleep-EDF data
      uses: actions/cache@v4
      with:
        path: data/sleep-edf
        key: sleep-edf-${{ runner.os }}-4subjects-v1

    - name: Fetch Sleep-EDF subset
      env:
        N_SUBJECTS_FETCH: 10
      run: |
        python fetch_all_data.py

    - name: Run XGBoost Training
      run: |
        python src/train_xgboost.py \
          --max-subjects 4 \
          --output-dir results/xgboost

    - name: Run Attention Training
      run: |
        python src/train_attention.py \
          --max-subjects 4 \
          --epochs 15 \
          --batch-size 64 \
          --learning-rate 1e-3 \
          --patience 3 \
          --label-smoothing 0.0 \
          --output-dir results/attention

    - name: Run U-Sleep Training
      run: |
        python src/train_usleep.py \
          --max-subjects 4 \
          --epochs 15 \
          --batch-size 64 \
          --learning-rate 1e-3 \
          --patience 3 \
          --label-smoothing 0.0 \
          --output-dir results/usleep

    - name: Upload Results Snapshot
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: sleep-staging-results
        path: results/
