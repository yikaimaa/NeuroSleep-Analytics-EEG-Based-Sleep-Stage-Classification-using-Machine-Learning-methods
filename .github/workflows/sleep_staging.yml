name: Sleep Stage Classification CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      transition_weight:
        description: "Transition weight for HMM decoding"
        required: false
        default: "1.0"
      transition_smoothing:
        description: "Transition smoothing for HMM estimation"
        required: false
        default: "1.0"

jobs:
  train-and-evaluate:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      TRANSITION_WEIGHT: ${{ github.event.inputs.transition_weight || '1.0' }}
      TRANSITION_SMOOTHING: ${{ github.event.inputs.transition_smoothing || '1.0' }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install "numpy<2" torch mne xgboost pandas scikit-learn matplotlib seaborn scipy

    - name: Cache Sleep-EDF data
      uses: actions/cache@v4
      with:
        path: data/sleep-edf
        key: sleep-edf-${{ runner.os }}-7subjects-v1

    - name: Fetch Sleep-EDF subset
      env:
        N_SUBJECTS_FETCH: 6
      run: |
        python fetch_all_data.py

    - name: Run XGBoost Training
      run: |
        python src/train_xgboost.py \
          --max-subjects 6 \
          --output-dir results/xgboost

    - name: Run Attention Training
      run: |
        python src/train_attention.py \
          --max-subjects 6 \
          --epochs 15 \
          --batch-size 64 \
          --num-workers 2 \
          --learning-rate 5e-4 \
          --patience 2 \
          --label-smoothing 0.0 \
          --transition-smoothing ${TRANSITION_SMOOTHING} \
          --transition-weight ${TRANSITION_WEIGHT} \
          --output-dir results/attention

    - name: Run U-Sleep Training
      run: |
        python src/train_usleep.py \
          --max-subjects 6 \
          --epochs 15 \
          --batch-size 64 \
          --num-workers 2 \
          --learning-rate 5e-4 \
          --patience 2 \
          --label-smoothing 0.0 \
          --transition-smoothing ${TRANSITION_SMOOTHING} \
          --transition-weight ${TRANSITION_WEIGHT} \
          --output-dir results/usleep

    - name: Upload Results Snapshot
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: sleep-staging-results-w${{ env.TRANSITION_WEIGHT }}
        path: results/